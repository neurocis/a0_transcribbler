<html>
<head>
    <title>a0_transcribbler</title>
</head>

<body>
    <div x-data>
        <template x-if="config">
            <div>
                <div class="section-title">a0_transcribbler</div>
                <div class="section-description">
                    Automatically transcribes audio file attachments, audio URLs, and YouTube
                    video audio before LLM processing. Reuses Agent Zero's built-in Whisper STT engine.
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Audio Transcription</div>
                        <div class="field-description">
                            Automatically detect and transcribe audio file attachments
                            (voice messages, .ogg, .mp3, .wav, etc.) before the LLM processes the message.
                        </div>
                    </div>
                    <div class="field-control">
                        <label class="toggle">
                            <input type="checkbox" x-model="config.audio_transcription_enabled" />
                            <span class="toggler"></span>
                        </label>
                    </div>
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">YouTube Transcription</div>
                        <div class="field-description">
                            Detect YouTube URLs in messages, download the audio track,
                            and transcribe it. Requires <code>yt-dlp</code> (installed automatically).
                        </div>
                    </div>
                    <div class="field-control">
                        <label class="toggle">
                            <input type="checkbox" x-model="config.youtube_transcription_enabled" />
                            <span class="toggler"></span>
                        </label>
                    </div>
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">YouTube Max Duration (seconds)</div>
                        <div class="field-description">
                            Maximum YouTube video duration in seconds. Videos longer than this
                            will be skipped. Set to 0 for no limit.
                        </div>
                    </div>
                    <div class="field-control">
                        <input type="number" x-model.number="config.youtube_max_duration" min="0" step="60" />
                    </div>
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Audio URL Transcription</div>
                        <div class="field-description">
                            Scan URLs in messages and transcribe those that directly serve audio
                            content (detected via MIME type). YouTube URLs are handled separately above.
                        </div>
                    </div>
                    <div class="field-control">
                        <label class="toggle">
                            <input type="checkbox" x-model="config.url_audio_transcription_enabled" />
                            <span class="toggler"></span>
                        </label>
                    </div>
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Audio URL Max Size (MB)</div>
                        <div class="field-description">
                            Maximum file size in megabytes for audio URL downloads.
                            URLs serving files larger than this will be skipped.
                        </div>
                    </div>
                    <div class="field-control">
                        <input type="number" x-model.number="config.url_audio_max_size" min="0" step="5" />
                    </div>
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Transcription Label</div>
                        <div class="field-description">
                            Prefix label added before each transcription block in the message.
                        </div>
                    </div>
                    <div class="field-control">
                        <input type="text" x-model="config.transcription_label" />
                    </div>
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Include Filename</div>
                        <div class="field-description">
                            Show the original audio filename in the transcription header.
                        </div>
                    </div>
                    <div class="field-control">
                        <label class="toggle">
                            <input type="checkbox" x-model="config.include_filename" />
                            <span class="toggler"></span>
                        </label>
                    </div>
                </div>

                <div class="section-title" style="margin-top: 1.5em;">Audio-Capable Model Bypass</div>
                <div class="section-description">
                    When the active chat model natively supports audio input (e.g. Gemini),
                    skip audio file and audio URL transcription and let the model process audio directly.
                    YouTube URL transcription still runs since models cannot access URLs.
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Enable Model Bypass</div>
                        <div class="field-description">
                            Automatically skip audio transcription when the active model
                            matches a known audio-capable pattern.
                        </div>
                    </div>
                    <div class="field-control">
                        <label class="toggle">
                            <input type="checkbox" x-model="config.model_bypass_enabled" />
                            <span class="toggler"></span>
                        </label>
                    </div>
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Audio-Capable Model Patterns</div>
                        <div class="field-description">
                            One pattern per line. Uses wildcard matching (<code>*</code> = any characters).
                            If the active chat model name matches any pattern, audio transcription
                            is skipped and the audio passes directly to the LLM.
                            Examples: <code>gemini-*</code>, <code>gpt-4o-audio-*</code>
                        </div>
                    </div>
                    <div class="field-control">
                        <textarea rows="4"
                            :value="(config.audio_capable_models || []).join('\n')"
                            @input="config.audio_capable_models = $event.target.value.split('\n').map(s => s.trim()).filter(Boolean)"
                            placeholder="gemini-*&#10;gpt-4o-audio-*"></textarea>
                    </div>
                </div>

            </div>
        </template>
    </div>
</body>
</html>
