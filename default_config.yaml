# A0-Transcribbler default configuration

# Enable/disable audio file transcription
audio_transcription_enabled: true

# Enable/disable YouTube URL transcription
youtube_transcription_enabled: true

# Enable/disable audio URL transcription (scans URLs in messages for audio MIME types)
url_audio_transcription_enabled: true

# Maximum YouTube video duration in seconds (0 = no limit)
youtube_max_duration: 3600

# Maximum audio URL download size in megabytes (0 = no limit)
url_audio_max_size: 50

# Audio file extensions to detect and transcribe
audio_extensions:
  - .ogg
  - .oga
  - .mp3
  - .wav
  - .m4a
  - .opus
  - .flac
  - .aac
  - .wma
  - .webm

# Prefix label added before each transcription block in the message
transcription_label: "[Transcription]"

# Include original filename in transcription header
include_filename: true

# --- Audio-Capable Model Bypass ---
# When enabled, skip audio transcription if the active chat model natively
# supports audio input. The audio attachment passes through untouched so
# the LLM can process it directly.
# NOTE: YouTube URL transcription still runs (models can't fetch URLs).
model_bypass_enabled: true

# Model name patterns that support native audio input.
# Matched case-insensitively against the active chat model name.
# Supports wildcards: * matches any characters.
audio_capable_models:
  - "gemini-*"                    # Google Gemini (all versions)
  - "gpt-4o-audio-*"             # OpenAI audio-preview models
  - "gpt-4o-mini-audio-*"        # OpenAI mini audio-preview
